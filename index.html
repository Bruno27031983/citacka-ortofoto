<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DXF čítačka – ortofoto a poloha</title>
<script src="https://cdn.jsdelivr.net/npm/proj4@2.12.1/dist/proj4.js"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#111827;color:#fff}header{position:relative;z-index:5;display:flex;gap:6px;flex-wrap:wrap;padding:7px;background:#fff;color:#17202a;border-bottom:1px solid #d7e0ea}button,label{border:1px solid #cbd5e1;border-radius:7px;background:#fff;color:#17202a;font-weight:700;font-size:12px;padding:8px 10px}button{cursor:pointer}button.active{background:#0f766e;color:#fff;border-color:#0f766e}label{display:inline-flex;align-items:center;gap:6px}input[type=file]{display:none}#wrap{position:relative;height:calc(100% - 49px)}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;background:#111827}.status{position:absolute;left:10px;bottom:10px;z-index:4;max-width:calc(100% - 20px);padding:7px 10px;border-radius:7px;background:rgba(255,255,255,.92);color:#17202a;font:12px Consolas,monospace}.tools{position:absolute;right:10px;top:10px;z-index:4;display:grid;gap:6px}.tools button{width:42px;height:42px;padding:0;font-size:20px}.hint{position:absolute;left:10px;top:10px;z-index:4;padding:8px 10px;border-radius:7px;background:rgba(255,255,255,.9);color:#475569;font-size:11px}.credit{position:absolute;right:10px;bottom:10px;z-index:3;padding:3px 7px;border-radius:5px;background:rgba(255,255,255,.8);color:#17202a;font-size:9px}.gpsbox{position:absolute;left:10px;top:55px;z-index:4;display:none;padding:8px 10px;border-radius:7px;background:rgba(255,255,255,.93);color:#17202a;font-size:11px;line-height:1.4}.gpsbox.show{display:block}@media(max-width:700px){header{display:grid;grid-template-columns:1fr 1fr 1fr}.hint{display:none}#wrap{height:calc(100% - 103px)}button,label{font-size:11px;padding:8px 5px}}
</style>
</head>
<body>
<header>
<label>📐 DXF<input id="file" type="file" accept=".dxf"></label>
<button id="fit" disabled>Centrovať</button>
<button id="ortho" disabled>Ortofoto OFF</button>
<button id="loc">Moja poloha OFF</button>
<button id="follow" disabled>Sledovať OFF</button>
<button id="clear">Vymazať</button>
</header>
<div id="wrap">
<canvas id="c"></canvas>
<div class="hint">Nahraj DXF. Ťahanie = posun, koliesko/štipnutie = zoom.</div>
<div class="tools"><button id="plus">+</button><button id="minus">−</button></div>
<div class="gpsbox" id="gpsbox"></div>
<div class="status" id="status">Pripravené. Poloha sa spracúva iba v tomto prehliadači.</div>
<div class="credit" id="credit" hidden>Ortofoto © GKÚ Bratislava, NLC – CC BY 4.0</div>
</div>
<script>
'use strict';
const c=document.getElementById('c'),ctx=c.getContext('2d');
const statusEl=document.getElementById('status'),gpsBox=document.getElementById('gpsbox');
let ents=[],bounds=null,scale=1,cx=0,cy=0,ortho=false,orthoImg=null,orthoKey='',orthoTimer=null;
let dragging=false,lastX=0,lastY=0,pinchDist=0,watchId=null,live=null,follow=false;
const WMS='https://zbgisws.skgeodesy.sk/zbgis_ortofoto_wms/service.svc/get';
const JTSK='+proj=krovak +lat_0=49.5 +lon_0=24.8333333333333 +alpha=30.2881397527778 +k=0.9999 +x_0=0 +y_0=0 +ellps=bessel +towgs84=485,169.5,483.8,7.786,4.398,4.103,0 +units=m +no_defs';
proj4.defs('EPSG:5514',JTSK);
function msg(t){statusEl.textContent=t}
function resize(){const r=c.getBoundingClientRect(),d=devicePixelRatio||1;c.width=Math.round(r.width*d);c.height=Math.round(r.height*d);ctx.setTransform(d,0,0,d,0,0);draw()}
addEventListener('resize',resize);
function screen(x,y){return{x:c.clientWidth/2+(x-cx)*scale,y:c.clientHeight/2-(y-cy)*scale}}
function world(x,y){return{x:cx+(x-c.clientWidth/2)/scale,y:cy-(y-c.clientHeight/2)/scale}}
function isJtsk(){return bounds&&bounds.minX>-960000&&bounds.maxX<-150000&&bounds.minY>-1360000&&bounds.maxY<-900000}
function calcBounds(){let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;const add=(x,y)=>{if(Number.isFinite(x)&&Number.isFinite(y)){minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y)}};for(const e of ents){if(e.t==='L'){add(e.x1,e.y1);add(e.x2,e.y2)}else if(e.t==='P'||e.t==='T')add(e.x,e.y);else if(e.t==='C'){add(e.x-e.r,e.y-e.r);add(e.x+e.r,e.y+e.r)}}bounds=minX<Infinity?{minX,maxX,minY,maxY}:null;document.getElementById('fit').disabled=!bounds;document.getElementById('ortho').disabled=!isJtsk()}
function fit(){if(!bounds)return;const rx=bounds.maxX-bounds.minX||1,ry=bounds.maxY-bounds.minY||1;scale=Math.max(.000001,Math.min((c.clientWidth-50)/rx,(c.clientHeight-50)/ry));cx=(bounds.minX+bounds.maxX)/2;cy=(bounds.minY+bounds.maxY)/2;orthoKey='';draw()}
function parseDXF(text){const l=text.replace(/^\uFEFF/,'').split(/\r?\n/),p=[];for(let i=0;i<l.length-1;i+=2){const code=parseInt(l[i],10);if(Number.isFinite(code))p.push([code,(l[i+1]||'').trim()])}const out=[];let i=0,inEnt=false;while(i<p.length){if(p[i][0]===0&&p[i][1].toUpperCase()==='SECTION'&&p[i+1]?.[0]===2){inEnt=p[i+1][1].toUpperCase()==='ENTITIES';i+=2;continue}if(inEnt&&p[i][0]===0){const type=p[i][1].toUpperCase();if(type==='ENDSEC'){inEnt=false;i++;continue}i++;const g=[];while(i<p.length&&p[i][0]!==0)g.push(p[i++]);const n=(code,def=null)=>{const q=g.find(v=>v[0]===code),v=q?parseFloat(q[1]):def;return Number.isFinite(v)?v:def};const s=code=>g.filter(v=>v[0]===code).map(v=>v[1]).join('');if(type==='LINE'){const a=[n(10),n(20),n(11),n(21)];if(a.every(Number.isFinite))out.push({t:'L',x1:a[0],y1:a[1],x2:a[2],y2:a[3]})}else if(type==='POINT'){const x=n(10),y=n(20);if(Number.isFinite(x)&&Number.isFinite(y))out.push({t:'P',x,y})}else if(type==='CIRCLE'){const x=n(10),y=n(20),r=n(40);if([x,y,r].every(Number.isFinite))out.push({t:'C',x,y,r})}else if(type==='TEXT'||type==='MTEXT'){const x=n(10),y=n(20),txt=s(1)+s(3);if(Number.isFinite(x)&&Number.isFinite(y))out.push({t:'T',x,y,txt})}else if(type==='LWPOLYLINE'){const xs=g.filter(v=>v[0]===10).map(v=>parseFloat(v[1])),ys=g.filter(v=>v[0]===20).map(v=>parseFloat(v[1]));for(let k=1;k<Math.min(xs.length,ys.length);k++)out.push({t:'L',x1:xs[k-1],y1:ys[k-1],x2:xs[k],y2:ys[k]})}}else i++}return out}
function scheduleOrtho(){if(!ortho||!isJtsk())return;const hw=c.clientWidth/(2*scale),hh=c.clientHeight/(2*scale),b={minX:cx-hw,maxX:cx+hw,minY:cy-hh,maxY:cy+hh},key=[b.minX.toFixed(1),b.minY.toFixed(1),b.maxX.toFixed(1),b.maxY.toFixed(1),c.clientWidth,c.clientHeight].join('|');if(key===orthoKey)return;clearTimeout(orthoTimer);orthoTimer=setTimeout(()=>{const url=WMS+'?service=WMS&version=1.3.0&request=GetMap&layers=1&styles=&crs=EPSG:5514&bbox='+b.minX+','+b.minY+','+b.maxX+','+b.maxY+'&width='+Math.min(1600,Math.round(c.clientWidth))+'&height='+Math.min(1600,Math.round(c.clientHeight))+'&format=image/jpeg';const im=new Image();im.onload=()=>{orthoImg={im,b};orthoKey=key;draw()};im.onerror=()=>msg('Ortofoto sa nepodarilo načítať.');im.src=url},250)}
function draw(){ctx.clearRect(0,0,c.clientWidth,c.clientHeight);ctx.fillStyle='#111827';ctx.fillRect(0,0,c.clientWidth,c.clientHeight);if(ortho&&orthoImg){const a=screen(orthoImg.b.minX,orthoImg.b.maxY),b=screen(orthoImg.b.maxX,orthoImg.b.minY);ctx.drawImage(orthoImg.im,a.x,a.y,b.x-a.x,b.y-a.y)}ctx.strokeStyle='#e5e7eb';ctx.fillStyle='#f8fafc';ctx.lineWidth=1;for(const e of ents){if(e.t==='L'){const a=screen(e.x1,e.y1),b=screen(e.x2,e.y2);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}else if(e.t==='P'){const a=screen(e.x,e.y);ctx.beginPath();ctx.arc(a.x,a.y,3,0,Math.PI*2);ctx.fill()}else if(e.t==='C'){const a=screen(e.x,e.y);ctx.beginPath();ctx.arc(a.x,a.y,Math.max(1,e.r*scale),0,Math.PI*2);ctx.stroke()}else if(e.t==='T'&&scale>1){const a=screen(e.x,e.y);ctx.font='11px Arial';ctx.fillText(e.txt,a.x,a.y)}}if(live){const a=screen(live.x,live.y),rr=Math.max(8,live.acc*scale);ctx.fillStyle='rgba(37,99,235,.14)';ctx.strokeStyle='rgba(37,99,235,.65)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(a.x,a.y,rr,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#2563eb';ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(a.x,a.y,7,0,Math.PI*2);ctx.fill();ctx.stroke()}scheduleOrtho()}
function zoom(f,x=c.clientWidth/2,y=c.clientHeight/2){const before=world(x,y);scale=Math.max(.000001,Math.min(50000,scale*f));cx=before.x-(x-c.clientWidth/2)/scale;cy=before.y+(y-c.clientHeight/2)/scale;orthoKey='';draw()}
function gpsToJtsk(lat,lon){let q=proj4('EPSG:4326','EPSG:5514',[lon,lat]);let x=q[0],y=q[1];if(Math.abs(x)>900000&&Math.abs(y)<960000)[x,y]=[y,x];return{x:-Math.abs(x),y:-Math.abs(y)}}
function stopLocation(){if(watchId!==null)navigator.geolocation.clearWatch(watchId);watchId=null;document.getElementById('loc').classList.remove('active');document.getElementById('loc').textContent='Moja poloha OFF';document.getElementById('follow').disabled=true;gpsBox.classList.remove('show')}
function startLocation(){if(!isSecureContext){msg('Poloha vyžaduje HTTPS.');return}if(!navigator.geolocation){msg('Tento prehliadač nepodporuje polohu.');return}document.getElementById('loc').classList.add('active');document.getElementById('loc').textContent='Moja poloha ON';watchId=navigator.geolocation.watchPosition(pos=>{try{const p=gpsToJtsk(pos.coords.latitude,pos.coords.longitude);live={...p,acc:Math.max(1,pos.coords.accuracy||0),lat:pos.coords.latitude,lon:pos.coords.longitude};gpsBox.classList.add('show');gpsBox.innerHTML='<b>Moja poloha</b><br>Presnosť ±'+Math.round(live.acc)+' m<br>Y: '+live.x.toFixed(3)+'<br>X: '+live.y.toFixed(3);document.getElementById('follow').disabled=false;if(follow||!bounds){cx=live.x;cy=live.y;scale=Math.max(scale,4);orthoKey=''}draw();msg('Poloha prijatá, presnosť ±'+Math.round(live.acc)+' m.')}catch(e){msg('Prevod polohy zlyhal: '+e.message)}},err=>{const m={1:'Poloha nebola povolená.',2:'Poloha nie je dostupná.',3:'Zistenie polohy trvalo príliš dlho.'};msg(m[err.code]||err.message);stopLocation()},{enableHighAccuracy:true,maximumAge:2000,timeout:20000})}
document.getElementById('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;msg('Načítavam '+f.name+'…');try{ents=parseDXF(await f.text());calcBounds();fit();msg('Načítané prvky: '+ents.length+(isJtsk()?' – S-JTSK rozpoznané.':' – ortofoto vyžaduje S-JTSK.'))}catch(err){msg('Chyba DXF: '+err.message)}};
document.getElementById('fit').onclick=fit;
document.getElementById('ortho').onclick=e=>{ortho=!ortho;e.currentTarget.classList.toggle('active',ortho);e.currentTarget.textContent=ortho?'Ortofoto ON':'Ortofoto OFF';document.getElementById('credit').hidden=!ortho;orthoKey='';draw()};
document.getElementById('loc').onclick=()=>watchId===null?startLocation():stopLocation();
document.getElementById('follow').onclick=e=>{follow=!follow;e.currentTarget.classList.toggle('active',follow);e.currentTarget.textContent=follow?'Sledovať ON':'Sledovať OFF';if(follow&&live){cx=live.x;cy=live.y;scale=Math.max(scale,4);orthoKey='';draw()}};
document.getElementById('clear').onclick=()=>{ents=[];bounds=null;orthoImg=null;live=null;calcBounds();draw();msg('Výkres a poloha boli vymazané.')};
document.getElementById('plus').onclick=()=>zoom(1.5);document.getElementById('minus').onclick=()=>zoom(1/1.5);
c.addEventListener('wheel',e=>{e.preventDefault();const r=c.getBoundingClientRect();zoom(e.deltaY<0?1.2:1/1.2,e.clientX-r.left,e.clientY-r.top)},{passive:false});
c.addEventListener('pointerdown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;c.setPointerCapture(e.pointerId)});c.addEventListener('pointermove',e=>{if(!dragging)return;cx-=(e.clientX-lastX)/scale;cy+=(e.clientY-lastY)/scale;lastX=e.clientX;lastY=e.clientY;orthoKey='';draw()});c.addEventListener('pointerup',()=>dragging=false);c.addEventListener('pointercancel',()=>dragging=false);
resize();
</script>
</body>
</html>
